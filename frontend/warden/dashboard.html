<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warden Dashboard — HSRMS</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div class="dashboard-container">
    <div class="topbar">
      <div style="display: flex; align-items: center;">
        <span class="topbar-brand">HSRMS</span>
        <span class="topbar-context" id="topbarContext"></span>
      </div>
      <div class="topbar-right">
        <a href="audit.html" class="topbar-link">Audit Log</a>
        <button class="topbar-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="single-col-layout">
      <div class="stats-grid" id="statsGrid">
        <div class="stat">
          <div class="stat-num accent" id="statTotal">0</div>
          <div class="stat-label">Total Requests</div>
        </div>
        <div class="stat">
          <div class="stat-num pending" id="statPending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat">
          <div class="stat-num active" id="statActive">0</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat">
          <div class="stat-num done" id="statDone">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat">
          <div class="stat-num" style="color: var(--ink);" id="statCompletionRate">0%</div>
          <div class="stat-label">Completion Rate</div>
        </div>
      </div>

      <div class="tab-row">
        <button class="tab active" data-tab="all" onclick="switchTab('all')">All Requests</button>
        <button class="tab" data-tab="pending" onclick="switchTab('pending')">Pending Only</button>
        <button class="tab" data-tab="completed" onclick="switchTab('completed')">Completed</button>
      </div>

      <div class="section-head">Service Requests</div>
      
      <div class="filter-bar">
        <span class="filter-label">Filter:</span>
        <select id="filter-status" onchange="applyFilters()">
          <option value="">All Status</option>
          <option value="Pending">Pending</option>
          <option value="Assigned">Assigned</option>
          <option value="Accepted">Accepted</option>
          <option value="Completed">Completed</option>
          <option value="Rejected">Rejected</option>
        </select>
        <select id="filter-category" onchange="applyFilters()">
          <option value="">All Categories</option>
        </select>
        <div class="filter-spacer"></div>
        <button class="btn-ghost" onclick="exportData()">Export</button>
      </div>
      
      <div id="errorBanner" class="error-banner" style="display: none;"></div>
      
      <table id="requestsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Student</th>
            <th>Room</th>
            <th>Category</th>
            <th>Status</th>
            <th>Assigned To</th>
            <th>Assigned Date</th>
            <th>Date Raised</th>
          </tr>
        </thead>
        <tbody id="requestsBody">
        </tbody>
      </table>
    </div>
  </div>

  <script src="../shared/util.js"></script>
  <script>
    // Check auth
    if (!session.get('warden_id')) {
      window.location.href = 'login.html';
    }
    
    // Set topbar context
    document.getElementById('topbarContext').textContent = 
      `Warden: ${session.get('name')} · ${session.get('hostel_name')}`;
    
    let currentRequestForAssignment = null;
    let allRequests = [];
    
    // Load stats
    async function loadStats() {
      try {
        const wardenId = session.get('warden_id');
        const stats = await api(`/warden/${wardenId}/stats`);
        
        document.getElementById('statTotal').textContent = stats.total || 0;
        document.getElementById('statPending').textContent = stats.pending || 0;
        document.getElementById('statActive').textContent = (stats.assigned || 0) + (stats.accepted || 0);
        document.getElementById('statDone').textContent = stats.completed || 0;
        document.getElementById('statCompletionRate').textContent = (stats.completion_rate || 0) + '%';
      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }
    
    // Load categories for filter
    async function loadCategories() {
      try {
        const categories = await api('/categories');
        const select = document.getElementById('filter-category');
        categories.forEach(cat => {
          const option = document.createElement('option');
          option.value = cat.name;
          option.textContent = cat.name;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Failed to load categories:', err);
      }
    }
    
    // Load requests
    async function loadRequests() {
      try {
        const wardenId = session.get('warden_id');
        allRequests = await api(`/warden/${wardenId}/requests`);
        renderRequests(allRequests);
      } catch (err) {
        document.getElementById('errorBanner').textContent = 
          'Failed to load data. Check your connection.';
        document.getElementById('errorBanner').style.display = 'block';
      }
    }
    
    // Render requests
    function renderRequests(requests) {
      const tbody = document.getElementById('requestsBody');
      tbody.innerHTML = '';
      
      if (requests.length === 0) {
        tbody.innerHTML = `
          <tr class="empty-row">
            <td colspan="8">
              <div class="empty-state">No requests found.</div>
            </td>
          </tr>
        `;
        return;
      }
      
      requests.forEach((req, idx) => {
        const dataRow = document.createElement('tr');
        dataRow.className = 'data-row';
        dataRow.dataset.detail = `detail-${req.request_id}`;
        dataRow.dataset.status = req.status;
        dataRow.dataset.category = req.category_name;
        dataRow.style.animationDelay = `${0.03 + idx * 0.04}s`;
        
        const statusClass = req.status.toLowerCase().replace(' ', '-');
        
        dataRow.innerHTML = `
          <td class="id">${fmt.id(req.request_id)}</td>
          <td>${req.student_name}</td>
          <td class="id">${req.room_number}</td>
          <td>${req.category_name}</td>
          <td><span class="badge ${statusClass}">${req.status}</span></td>
          <td>${req.staff_name || '—'}</td>
          <td>${req.assigned_date ? fmt.date(req.assigned_date) : '—'}</td>
          <td class="id">${fmt.datetime(req.date_raised)}</td>
        `;
        
        dataRow.addEventListener('click', () => toggleRow(dataRow, `detail-${req.request_id}`));
        
        const detailRow = document.createElement('tr');
        detailRow.id = `detail-${req.request_id}`;
        detailRow.className = 'detail-row';
        detailRow.style.display = 'none';
        detailRow.innerHTML = `
          <td colspan="8">
            <div class="detail-grid">
              <div class="detail-full">
                <div class="detail-label">Full Description</div>
                <div class="detail-value">${req.description}</div>
              </div>
              <div>
                <div class="detail-label">Student Name</div>
                <div class="detail-value">${req.student_name}</div>
              </div>
              <div>
                <div class="detail-label">Student Email</div>
                <div class="detail-value">${req.student_email || 'N/A'}</div>
              </div>
              <div>
                <div class="detail-label">Student Phone</div>
                <div class="detail-value">${req.student_phone || 'N/A'}</div>
              </div>
              <div>
                <div class="detail-label">Location</div>
                <div class="detail-value">Room ${req.room_number}, ${req.hostel_name}</div>
              </div>
              <div>
                <div class="detail-label">Category</div>
                <div class="detail-value">${req.category_name}</div>
              </div>
              <div>
                <div class="detail-label">Status</div>
                <div class="detail-value"><span class="badge ${statusClass}">${req.status}</span></div>
              </div>
              <div>
                <div class="detail-label">Date Raised</div>
                <div class="detail-value">${fmt.datetime(req.date_raised)}</div>
              </div>
              ${req.staff_name ? `
                <div class="detail-full" style="border-top: 1px solid var(--bdr); padding-top: 12px; margin-top: 12px;">
                  <div class="detail-label">Assigned Staff Details</div>
                </div>
                <div>
                  <div class="detail-label">Staff Name</div>
                  <div class="detail-value">${req.staff_name}</div>
                </div>
                <div>
                  <div class="detail-label">Assigned Date</div>
                  <div class="detail-value">${fmt.datetime(req.assigned_date)}</div>
                </div>
                ${req.completion_date ? `
                  <div>
                    <div class="detail-label">Completion Date</div>
                    <div class="detail-value">${fmt.datetime(req.completion_date)}</div>
                  </div>
                ` : ''}
              ` : ''}
            </div>
          </td>
        `;
        
        tbody.appendChild(dataRow);
        tbody.appendChild(detailRow);
      });
    }
    
    // Tab switching
    window.switchTab = (tab) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      
      let filtered = allRequests;
      if (tab === 'pending') {
        filtered = allRequests.filter(r => r.status === 'Pending');
      } else if (tab === 'completed') {
        filtered = allRequests.filter(r => r.status === 'Completed');
      }
      
      renderRequests(filtered);
    };
    
    // Filter function
    window.applyFilters = () => {
      const status = document.getElementById('filter-status').value;
      const category = document.getElementById('filter-category').value;
      
      document.querySelectorAll('tbody tr.data-row').forEach(row => {
        const match =
          (!status || row.dataset.status === status) &&
          (!category || row.dataset.category === category);
        
        row.style.display = match ? '' : 'none';
        
        const detailId = row.dataset.detail;
        if (detailId && !match) {
          document.getElementById(detailId).style.display = 'none';
          row.classList.remove('expanded');
        }
      });
    };
    
    // Export data
    window.exportData = () => {
      const csv = [
        ['ID', 'Student', 'Room', 'Category', 'Status', 'Assigned To', 'Date Raised'].join(','),
        ...allRequests.map(r => [
          fmt.id(r.request_id),
          r.student_name,
          r.room_number,
          r.category_name,
          r.status,
          r.staff_name || 'Unassigned',
          fmt.datetime(r.date_raised)
        ].join(','))
      ].join('\n');
      
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `hsrms-requests-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    };
    
    // Logout
    window.logout = () => {
      session.clear();
      window.location.href = 'login.html';
    };
    
    // Initialize
    loadStats();
    loadCategories();
    loadRequests();
  </script>
</body>
</html>
