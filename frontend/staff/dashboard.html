<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard — HSRMS</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div class="dashboard-container">
    <div class="topbar">
      <div style="display: flex; align-items: center;">
        <span class="topbar-brand">HSRMS</span>
        <span class="topbar-context" id="topbarContext"></span>
      </div>
      <div class="topbar-right">
        <button class="topbar-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="single-col-layout">
      <div class="tab-row">
        <button class="tab active" data-tab="available" onclick="switchTab('available')">Available Requests</button>
        <button class="tab" data-tab="myjobs" onclick="switchTab('myjobs')">My Jobs</button>
      </div>

      <!-- Available Requests Section -->
      <div id="availableSection">
        <div class="section-head">Available Requests</div>
        
        <div id="availableError" class="error-banner" style="display: none;"></div>
        
        <table id="availableTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Student</th>
              <th>Room</th>
              <th>Block</th>
              <th>Category</th>
              <th>Date Raised</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="availableBody">
          </tbody>
        </table>
      </div>

      <!-- My Jobs Section -->
      <div id="myjobsSection" style="display: none;">
        <div class="section-head">My Accepted Jobs</div>
        
        <div class="filter-bar">
          <span class="filter-label">Filter:</span>
          <select id="filter-status" onchange="applyFilters()">
            <option value="">All Status</option>
            <option value="Accepted">Accepted</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        
        <div id="errorBanner" class="error-banner" style="display: none;"></div>
        
        <table id="assignmentsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Req</th>
              <th>Student</th>
              <th>Room</th>
              <th>Block</th>
              <th>Description</th>
              <th>Status</th>
              <th>Assigned</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="assignmentsBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../shared/util.js"></script>
  <script>
    // Check auth
    console.log('Staff ID from session:', session.get('staff_id'));
    if (!session.get('staff_id')) {
      console.log('No staff_id found, redirecting to login');
      window.location.href = 'login.html';
    }
    
    // Set topbar context
    document.getElementById('topbarContext').textContent = 
      `${session.get('name')} · ${session.get('specialization')}`;
    
    // Load available requests
    async function loadAvailable() {
      try {
        const staffId = session.get('staff_id');
        console.log('Loading available requests for staff:', staffId);
        const available = await api(`/staff/${staffId}/available`);
        console.log('Available requests loaded:', available);
        
        const tbody = document.getElementById('availableBody');
        tbody.innerHTML = '';
        
        if (available.length === 0) {
          tbody.innerHTML = `
            <tr class="empty-row">
              <td colspan="7">
                <div class="empty-state">No available requests in your category.</div>
              </td>
            </tr>
          `;
          return;
        }
        
        available.forEach((req, idx) => {
          const dataRow = document.createElement('tr');
          dataRow.className = 'data-row';
          dataRow.dataset.detail = `avail-detail-${req.request_id}`;
          dataRow.style.animationDelay = `${0.03 + idx * 0.04}s`;
          
          dataRow.innerHTML = `
            <td class="id">${fmt.id(req.request_id)}</td>
            <td>${req.student_name}</td>
            <td class="id">${req.room_number}</td>
            <td>${req.hostel_name}</td>
            <td>${req.category_name}</td>
            <td>${fmt.date(req.date_raised)}</td>
            <td><button class="btn-inline primary" onclick="acceptRequest(${req.request_id})">Accept</button></td>
          `;
          
          dataRow.addEventListener('click', (e) => {
            if (!e.target.closest('button')) {
              toggleRow(dataRow, `avail-detail-${req.request_id}`);
            }
          });
          
          const detailRow = document.createElement('tr');
          detailRow.id = `avail-detail-${req.request_id}`;
          detailRow.className = 'detail-row';
          detailRow.style.display = 'none';
          detailRow.innerHTML = `
            <td colspan="7">
              <div class="detail-grid">
                <div class="detail-full">
                  <div class="detail-label">Full Description</div>
                  <div class="detail-value">${req.description}</div>
                </div>
                <div>
                  <div class="detail-label">Category</div>
                  <div class="detail-value">${req.category_name}</div>
                </div>
                <div>
                  <div class="detail-label">Location</div>
                  <div class="detail-value">Room ${req.room_number}, ${req.hostel_name}</div>
                </div>
                <div>
                  <div class="detail-label">Date Raised</div>
                  <div class="detail-value">${fmt.datetime(req.date_raised)}</div>
                </div>
              </div>
            </td>
          `;
          
          tbody.appendChild(dataRow);
          tbody.appendChild(detailRow);
        });
      } catch (err) {
        console.error('Error loading available requests:', err);
        document.getElementById('availableError').textContent = 
          'Failed to load available requests. Check your connection.';
        document.getElementById('availableError').style.display = 'block';
      }
    }
    
    // Accept request
    window.acceptRequest = async (requestId) => {
      if (!confirm('Accept this request?')) return;
      
      try {
        await api(`/staff/accept/${requestId}`, {
          method: 'POST'
        });
        alert('Request accepted successfully!');
        await loadAvailable();
        await loadAssignments();
      } catch (err) {
        alert('Failed to accept request. It may have been taken by another staff member.');
        await loadAvailable();
      }
    };
    
    // Load assignments
    async function loadAssignments() {
      try {
        const staffId = session.get('staff_id');
        console.log('Loading assignments for staff:', staffId);
        const assignments = await api(`/staff/${staffId}/assignments`);
        console.log('Assignments loaded:', assignments);
        
        const tbody = document.getElementById('assignmentsBody');
        tbody.innerHTML = '';
        
        if (assignments.length === 0) {
          tbody.innerHTML = `
            <tr class="empty-row">
              <td colspan="9">
                <div class="empty-state">No accepted jobs yet.</div>
              </td>
            </tr>
          `;
          return;
        }
        
        assignments.forEach((asn, idx) => {
          const dataRow = document.createElement('tr');
          dataRow.className = 'data-row';
          dataRow.dataset.detail = `detail-${asn.assignment_id}`;
          dataRow.dataset.status = asn.status;
          dataRow.style.animationDelay = `${0.03 + idx * 0.04}s`;
          
          const statusClass = asn.status.toLowerCase().replace(' ', '-');
          const truncDesc = asn.description.length > 60 
            ? asn.description.substring(0, 60) + '...' 
            : asn.description;
          
          let actionBtn = '';
          if (asn.status === 'Accepted') {
            actionBtn = `<button class="btn-inline primary" onclick="completeAssignment(${asn.assignment_id})">Complete</button>`;
          } else if (asn.status === 'Completed') {
            actionBtn = `<span class="btn-inline done">Done ✓</span>`;
          }
          
          dataRow.innerHTML = `
            <td class="id">${asn.assignment_id}</td>
            <td class="id">${fmt.id(asn.request_id)}</td>
            <td>${asn.student_name}</td>
            <td class="id">${asn.room_number}</td>
            <td>${asn.hostel_name}</td>
            <td>${truncDesc}</td>
            <td><span class="badge ${statusClass}">${asn.status}</span></td>
            <td>${fmt.date(asn.assigned_date)}</td>
            <td>${actionBtn}</td>
          `;
          
          dataRow.addEventListener('click', (e) => {
            if (!e.target.closest('button')) {
              toggleRow(dataRow, `detail-${asn.assignment_id}`);
            }
          });
          
          const detailRow = document.createElement('tr');
          detailRow.id = `detail-${asn.assignment_id}`;
          detailRow.className = 'detail-row';
          detailRow.style.display = 'none';
          detailRow.innerHTML = `
            <td colspan="9">
              <div class="detail-grid">
                <div class="detail-full">
                  <div class="detail-label">Full Description</div>
                  <div class="detail-value">${asn.description}</div>
                </div>
                <div>
                  <div class="detail-label">Category</div>
                  <div class="detail-value">${asn.category_name}</div>
                </div>
                <div>
                  <div class="detail-label">Location</div>
                  <div class="detail-value">Room ${asn.room_number}, ${asn.hostel_name}</div>
                </div>
                <div>
                  <div class="detail-label">Assigned Date</div>
                  <div class="detail-value">${fmt.datetime(asn.assigned_date)}</div>
                </div>
                ${asn.completion_date ? `
                  <div>
                    <div class="detail-label">Completed Date</div>
                    <div class="detail-value">${fmt.datetime(asn.completion_date)}</div>
                  </div>
                ` : ''}
              </div>
            </td>
          `;
          
          tbody.appendChild(dataRow);
          tbody.appendChild(detailRow);
        });
      } catch (err) {
        console.error('Error loading assignments:', err);
        document.getElementById('errorBanner').textContent = 
          'Failed to load data. Check your connection.';
        document.getElementById('errorBanner').style.display = 'block';
      }
    }
    
    // Complete assignment
    window.completeAssignment = async (assignmentId) => {
      if (!confirm('Mark this job as completed?')) return;
      
      try {
        await api(`/staff/assignment/${assignmentId}`, {
          method: 'PUT',
          body: JSON.stringify({ status: 'Completed' })
        });
        await loadAssignments();
      } catch (err) {
        alert('Failed to complete assignment. Please try again.');
      }
    };
    
    // Tab switching
    window.switchTab = (tab) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      
      document.getElementById('availableSection').style.display = tab === 'available' ? 'block' : 'none';
      document.getElementById('myjobsSection').style.display = tab === 'myjobs' ? 'block' : 'none';
    };
    
    // Filter function
    window.applyFilters = () => {
      const status = document.getElementById('filter-status').value;
      
      document.querySelectorAll('#assignmentsBody tr.data-row').forEach(row => {
        const match = !status || row.dataset.status === status;
        row.style.display = match ? '' : 'none';
        
        const detailId = row.dataset.detail;
        if (detailId && !match) {
          document.getElementById(detailId).style.display = 'none';
          row.classList.remove('expanded');
        }
      });
    };
    
    // Logout
    window.logout = () => {
      session.clear();
      window.location.href = 'login.html';
    };
    
    // Initialize
    loadAvailable();
    loadAssignments();
  </script>
</body>
</html>
