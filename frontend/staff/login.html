<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — HSRMS</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">HSRMS</div>
      <div class="login-role">Staff Login</div>
      
      <form id="loginForm">
        <div class="field">
          <label for="staffId">Staff ID</label>
          <input type="text" id="staffId" name="staffId" required>
        </div>
        
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit" class="btn-primary">Enter →</button>
        
        <div id="loginError" class="login-error"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { session, api } from '../shared/util.js';
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const staffId = document.getElementById('staffId').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      
      errorEl.style.display = 'none';
      
      try {
        const res = await api('/auth/staff', {
          method: 'POST',
          body: JSON.stringify({ staff_id: staffId, password })
        });
        
        session.set('staff_id', res.staff_id);
        session.set('name', res.name);
        session.set('specialization', res.specialization);
        session.set('role', 'staff');
        
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = 'Invalid credentials. Please try again.';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
